name: azen-memory

networks:
  azen_network:
    driver: bridge

services:

  postgres:
    image: pgvector/pgvector:pg16
    shm_size: "128mb"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-azen}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - azen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-azen}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - azen_network
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    shm_size: "128mb"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4jdata:/data
    networks:
      - azen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - azen_network
    restart: unless-stopped
    profiles: ["qdrant"]

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - azen_network
    restart: unless-stopped
    profiles: ["ollama"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: azen-memory:latest
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-azen}
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
    networks:
      - azen_network
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  qdrantdata:
  ollamadata: